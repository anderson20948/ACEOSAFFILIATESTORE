version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aceos_affiliate_web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules # Prevents local node_modules from overwriting container's node_modules
    command: npm run dev # Use nodemon for hot-reloading during development
