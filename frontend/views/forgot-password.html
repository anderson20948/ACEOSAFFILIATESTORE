<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Aceos Affiliate</title>
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600%7CPoppins:300,400,500,600,900"
        rel="stylesheet">
    <link rel="stylesheet" href="css/font-awesome.css">
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/auth.css">
    <style>
        .wizard-step {
            display: none;
        }

        .wizard-step.active {
            display: block;
        }

        .success-icon {
            font-size: 48px;
            color: #28a745;
            margin-bottom: 20px;
        }
    </style>
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="logo">
            <a href="/"><img src="images/logo.png" alt="Aceos"></a>
        </div>
        <h2>Reset Password</h2>
        <p class="subtitle" id="wizardSubtitle">Recover access to your account</p>

        <!-- Step 1: Email -->
        <div class="wizard-step active" id="step1">
            <form id="emailForm">
                <div class="form-group">
                    <label for="forgotEmail">Email Address</label>
                    <input type="email" id="forgotEmail" class="form-control" placeholder="your.email@example.com"
                        required autofocus autocomplete="email">
                </div>
                <button type="submit" class="btn-auth" id="emailBtn">Send Recovery Code</button>
            </form>
        </div>

        <!-- Step 2: Code -->
        <div class="wizard-step" id="step2">
            <form id="codeForm">
                <div class="form-group">
                    <label for="recoveryCode">Verification Code</label>
                    <input type="text" id="recoveryCode" class="form-control" placeholder="6-digit code" maxlength="6"
                        required style="text-align: center; letter-spacing: 5px; font-weight: 700;">
                </div>
                <button type="submit" class="btn-auth" id="codeBtn">Verify Code</button>
                <div style="margin-top: 15px;">
                    <a href="#" id="resendBtn"
                        style="font-size: 13px; color: #ff5e14; font-weight: 600; text-decoration: none;">Resend
                        Code</a>
                </div>
            </form>
        </div>

        <!-- Step 3: New Password -->
        <div class="wizard-step" id="step3">
            <form id="passwordForm">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" class="form-control" placeholder="Min. 8 characters"
                        required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm new password"
                        required autocomplete="new-password">
                </div>
                <button type="submit" class="btn-auth" id="passwordBtn">Reset Password</button>
            </form>
        </div>

        <!-- Success Step -->
        <div class="wizard-step" id="stepSuccess">
            <div class="success-icon"><i class="fa fa-check-circle"></i></div>
            <h3 style="font-weight: 700; color: #333;">All Set!</h3>
            <p style="color: #666; margin-bottom: 25px;">Your password has been successfully reset.</p>
            <a href="login.html" class="btn-auth" style="text-decoration: none;">Proceed to Login</a>
        </div>

        <div class="footer-links" id="backToLoginLink">
            Remembered your password? <a href="login.html">Sign In</a>
        </div>
    </div>

    <script src="js/jquery.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let userEmail = '';
        let recoveryToken = '';

        // Unified Step Handler
        function showStep(stepId) {
            $('.wizard-step').removeClass('active');
            $(`#${stepId}`).addClass('active');

            if (stepId === 'step2') $('#wizardSubtitle').text('Enter the 6-digit code sent to your email');
            if (stepId === 'step3') $('#wizardSubtitle').text('Create a strong new password');
            if (stepId === 'stepSuccess') {
                $('#wizardSubtitle').hide();
                $('#backToLoginLink').hide();
            }
        }

        document.getElementById('emailForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            userEmail = document.getElementById('forgotEmail').value;
            const btn = document.getElementById('emailBtn');
            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                const data = await safeFetch('/api/auth/forgot-password', {
                    method: 'POST',
                    body: JSON.stringify({ email: userEmail })
                });

                if (data && data.success) {
                    showNotification('Recovery code sent!', 'success');
                    showStep('step2');
                }
            } catch (err) {
                showNotification('Email not found or error occurred', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send Recovery Code';
            }
        });

        document.getElementById('codeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('recoveryCode').value;
            const btn = document.getElementById('codeBtn');
            btn.disabled = true;
            btn.textContent = 'Verifying...';

            try {
                const data = await safeFetch('/api/auth/verify-code', {
                    method: 'POST',
                    body: JSON.stringify({ email: userEmail, code })
                });

                if (data && data.success) {
                    recoveryToken = code; // Using code as reference for next step
                    showNotification('Code verified!', 'success');
                    showStep('step3');
                }
            } catch (err) {
                showNotification('Invalid or expired code', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Verify Code';
            }
        });

        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('passwordBtn');

            if (newPassword !== confirmPassword) {
                showNotification('Passwords do not match', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Resetting...';

            try {
                const data = await safeFetch('/api/auth/reset-password', {
                    method: 'POST',
                    body: JSON.stringify({
                        email: userEmail,
                        code: recoveryToken,
                        newPassword
                    })
                });

                if (data && data.success) {
                    showNotification('Password reset successfully!', 'success');
                    showStep('stepSuccess');
                }
            } catch (err) {
                showNotification('Failed to reset password', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        });

        document.getElementById('resendBtn').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('emailForm').dispatchEvent(new Event('submit'));
        });
    </script>
</body>

</html>
