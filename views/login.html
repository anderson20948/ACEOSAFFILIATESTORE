<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aceos Affiliate</title>
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600%7CPoppins:300,400,500,600,900"
        rel="stylesheet">
    <link rel="stylesheet" href="css/font-awesome.css">
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="logo">
            <a href="/"><img src="images/logo.png" alt="Aceos"></a>
        </div>
        <h2>Welcome Back!</h2>
        <p class="subtitle">Login to your affiliate dashboard</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="example@mail.com" required autofocus
                    autocomplete="email">
            </div>
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <label for="password" style="margin-bottom: 0;">Password</label>
                    <a href="forgot-password.html"
                        style="font-size: 13px; color: #ff5e14; font-weight: 600; text-decoration: none;">Forgot?</a>
                </div>
                <div class="relative">
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required
                        autocomplete="current-password">
                    <i class="fa fa-eye toggle-password"></i>
                </div>
            </div>
            <button type="submit" class="btn-auth">Sign In</button>
        </form>

        <div class="divider"><span>OR</span></div>

        <a href="/auth/google" class="google-btn">
            <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google"
                style="width: 20px; height: 20px;">
            Sign in with Google
        </a>

        <div class="footer-links">
            Don't have an account? <a href="register.html">Sign Up</a>
        </div>
    </div>

    <script src="js/jquery.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            await handleLogin(email, password);
        });
    </script>
</body>

</html>
