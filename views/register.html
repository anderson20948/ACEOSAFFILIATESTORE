<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Aceos Affiliate</title>
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600%7CPoppins:300,400,500,600,900"
        rel="stylesheet">
    <link rel="stylesheet" href="css/font-awesome.css">
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="logo">
            <a href="/"><img src="images/logo.png" alt="Aceos"></a>
        </div>
        <h2>Create Account</h2>
        <p class="subtitle">Join our premium affiliate network</p>

        <form id="regForm">
            <div class="form-group">
                <label for="regName">Full Name</label>
                <input type="text" id="regName" class="form-control" placeholder="Enter your full name" required
                    autofocus autocomplete="name">
            </div>

            <div class="form-group">
                <label for="regEmail">Email Address</label>
                <input type="email" id="regEmail" class="form-control" placeholder="example@mail.com" required
                    autocomplete="email">
            </div>

            <div class="form-group">
                <label for="regPass">Password</label>
                <div class="relative">
                    <input type="password" id="regPass" class="form-control" placeholder="Min. 8 characters" required
                        autocomplete="new-password">
                    <i class="fa fa-eye toggle-password"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="regConfirm">Confirm Password</label>
                <div class="relative">
                    <input type="password" id="regConfirm" class="form-control" placeholder="Confirm your password"
                        required autocomplete="new-password">
                    <i class="fa fa-eye toggle-password"></i>
                </div>
            </div>

            <button type="submit" class="btn-auth">Register Now</button>
        </form>

        <div class="divider"><span>OR</span></div>

        <a href="/auth/google" class="google-btn">
            <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google"
                style="width: 20px; height: 20px;">
            Sign up with Google
        </a>

        <div class="footer-links">
            Already have an account? <a href="login.html">Sign In</a>
        </div>
    </div>

    <script src="js/jquery.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await handleRegister();
        });
    </script>
</body>

</html>
